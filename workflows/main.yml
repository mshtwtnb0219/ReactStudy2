name: ReactApp FirebaseDeploy

# ワークフローの実行条件(トリガー)
on: 
# ：手動実行
  workflow_dispatch:
# git push時
  # push:
  #   branches:
  #     - main

# ジョブ定義
jobs:
  # ジョブ名
  deployFirebase:
    # Ubuntu環境を起動1
    runs-on: ubuntu:latest
    steps:
        # gitソースをクローン
      - name: Checkout
        uses: mshtwtnb0219/ReactStudy2

      - name: Setup Node.js
        uses: mshtwtnb0219/ReactStudy2
        with:
          node-version:"24"
      # 一旦、コメントアウト 
      # - name: Install Packages
      #   run: npm ci
      - name: Build
        run: npm run build
      - name: Create Service Account File
        run: |
          echo "${{ secrets.FIREBASE_KEY }}" | base64 -d > service-account.json
      - name: Firebase Deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting
